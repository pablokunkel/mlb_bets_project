name: Deploy live-hr worker

# Auto-deploy the dingersonly-live-hr Cloudflare Worker on every push
# to main that touches the worker source. The companion `dingersonlybot`
# worker (the static-site assets worker) auto-deploys via Cloudflare
# Workers Builds — that's wired up at the CF dashboard level. But
# `dingersonly-live-hr` lives in workers/live-hr/ with its own
# wrangler.toml and has no Workers Builds binding, so without this
# action a merged PR's source change never reached production. That
# bit us on PR #22 (KV cost fix): merged 2026-05-03, never deployed,
# 90% KV-write warning email re-fired the next day with the patch
# sitting unused in main.
#
# Path filter scopes the trigger to just the worker so unrelated
# pushes (Python pipeline, dashboard JS, etc.) don't burn an Action
# run for nothing.

on:
  push:
    branches: [main]
    paths:
      - "workers/live-hr/**"
      - ".github/workflows/deploy-live-hr.yml"
  # Manual trigger so we can re-deploy without a code change (e.g.,
  # after a CF outage rollback, or to force-resync if the live worker
  # is suspected stale).
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Just-in-case guard: never deploy from a fork PR. push to main
    # comes from this repo only, but workflow_dispatch could in theory
    # be triggered from elsewhere.
    if: github.repository == 'pablokunkel/mlb_bets_project'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install wrangler. We don't keep workers/live-hr/package.json
      # canonical for the deploy step (it's there for local dev) — pin
      # the version explicitly here so a wrangler major bump can't
      # silently change deploy semantics behind our back.
      - name: Install wrangler
        run: npm install -g wrangler@4

      - name: Deploy worker
        working-directory: workers/live-hr
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        # --config wrangler.toml is mandatory: without it wrangler
        # walks UP from the cwd and finds the root wrangler.jsonc
        # (which is for the dingersonlybot static-site worker), then
        # silently deploys to the wrong worker. Bit us during the
        # initial CF setup in early May — keeping the explicit flag
        # here as belt-and-suspenders since the cwd is already scoped
        # by working-directory.
        run: wrangler deploy --config wrangler.toml

      # Confirm the new code is actually serving traffic. We check two
      # invariants that together cover most of what's shipped to date:
      #
      #   1. fp field present (PR #22). Every payload carries it; absence
      #      means an ancient version is live.
      #
      #   2. Worker's `date` matches slate_date.json (PR #46). The worker
      #      reads slate_date.json and pins its rollover to whatever the
      #      pipeline published. If the worker is serving today's calendar
      #      date while slate_date.json is on yesterday's, PR #46's
      #      slate-driven rollover isn't reaching production.
      #
      # The PR #46 check is what would have caught the bug found on
      # 2026-05-12 (cashed flags dark between midnight ET and the noon
      # run): the original smoke check only verified fp, so three failed
      # deploys (#31, #37, #46) all rolled by with the action red but
      # the symptom only visible to users at midnight.
      - name: Smoke-check deployed worker
        run: |
          set -euo pipefail
          # Give CF a few seconds to propagate the deploy globally.
          sleep 5

          body=$(curl -fsSL "https://api.dingersonly.cc/api/live-hrs")
          echo "Response (first 400 chars): ${body:0:400}"

          # Invariant 1: fp field (PR #22).
          echo "$body" | grep -q '"fp"' || {
            echo "::error::Deployed worker response missing 'fp' field — PR #22's KV optimization may not be live."
            exit 1
          }
          echo "✓ fp field present (PR #22)."

          # Invariant 2: worker date == slate_date.json date (PR #46).
          # Use python so we get robust JSON parsing rather than fragile regex.
          slate_date=$(curl -fsSL "https://dingersonly.cc/data/slate_date.json" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['date'])")
          worker_date=$(echo "$body" \
            | python3 -c "import json,sys; print(json.load(sys.stdin)['date'])")
          echo "slate_date.json:  $slate_date"
          echo "worker /api date: $worker_date"
          if [ "$slate_date" != "$worker_date" ]; then
            echo "::error::Worker is serving date=$worker_date but slate_date.json says $slate_date — PR #46's slate-driven rollover is not active (worker fell back to calendar date)."
            exit 1
          fi
          echo "✓ worker date matches slate (PR #46)."

          echo "Smoke checks passed."
