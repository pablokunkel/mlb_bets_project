<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HR Parlay Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface-2: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --orange: #d29922;
      --purple: #bc8cff;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 1100px; margin: 0 auto; padding: 20px; }

    /* Header */
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    header h1 { font-size: 22px; font-weight: 700; }
    header h1 span { color: var(--accent); }
    .date-badge {
      background: var(--surface); border: 1px solid var(--border);
      padding: 6px 14px; border-radius: 20px; font-size: 13px; color: var(--text-muted);
    }

    /* Nav tabs */
    .tabs {
      display: flex; gap: 4px; margin-bottom: 24px;
      border-bottom: 1px solid var(--border); padding-bottom: 0;
    }
    .tab {
      padding: 10px 18px; cursor: pointer; font-size: 14px; font-weight: 500;
      color: var(--text-muted); border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* Panels */
    .panel { display: none; }
    .panel.active { display: block; }

    /* Live indicator dot on the HR Recap tab */
    .live-dot {
      display: inline-block; width: 8px; height: 8px; border-radius: 50%;
      background: var(--red); margin-left: 6px; vertical-align: middle;
      box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.7);
      animation: livePulse 1.6s infinite;
    }
    .live-dot.stale { background: var(--text-muted); animation: none; box-shadow: none; }
    @keyframes livePulse {
      0%   { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0.6); }
      70%  { box-shadow: 0 0 0 8px rgba(248, 81, 73, 0); }
      100% { box-shadow: 0 0 0 0 rgba(248, 81, 73, 0); }
    }

    /* HR Recap panel */
    .recap-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 8px 0 12px;
    }
    .recap-header h3 { font-size: 16px; font-weight: 600; }
    .recap-status {
      margin-left: 10px; font-size: 12px; color: var(--text-muted);
      font-weight: 400;
    }
    .recap-refresh {
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 6px 12px; font-size: 12px; cursor: pointer;
    }
    .recap-refresh:hover { background: var(--surface-2); }
    .recap-refresh:disabled { opacity: 0.5; cursor: wait; }

    .hr-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; margin-bottom: 10px;
      display: grid; grid-template-columns: auto 1fr auto; gap: 14px;
      align-items: center;
    }
    .hr-card.new { animation: hrFlash 1.6s ease-out; }
    @keyframes hrFlash {
      0%   { background: rgba(63, 185, 80, 0.18); }
      100% { background: var(--surface); }
    }
    .hr-inning {
      background: var(--surface-2); border-radius: 8px; padding: 8px 10px;
      text-align: center; min-width: 56px;
      font-size: 11px; color: var(--text-muted); text-transform: uppercase;
    }
    .hr-inning .num { font-size: 18px; color: var(--text); font-weight: 700; display: block; }
    .hr-body .player { font-size: 16px; font-weight: 600; color: var(--text); }
    .hr-body .meta {
      font-size: 12px; color: var(--text-muted); margin-top: 4px;
      display: flex; flex-wrap: wrap; gap: 8px;
    }
    .hr-body .meta .pill {
      background: var(--surface-2); padding: 2px 8px; border-radius: 12px;
      font-size: 11px;
    }
    .hr-body .desc { font-size: 12px; color: var(--text); margin-top: 6px; opacity: 0.85; }
    .hr-side { text-align: right; font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .hr-side .score { font-size: 13px; color: var(--text); font-weight: 600; }
    .hr-empty {
      background: var(--surface); border: 1px dashed var(--border);
      border-radius: 10px; padding: 24px; text-align: center; color: var(--text-muted);
    }

    /* Stat cards */
    .stat-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; margin-bottom: 24px; }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px;
    }
    .stat-card .label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-card .value { font-size: 28px; font-weight: 700; margin-top: 4px; }
    .stat-card .value.green { color: var(--green); }
    .stat-card .value.accent { color: var(--accent); }
    .stat-card .value.orange { color: var(--orange); }

    /* Picks table */
    .picks-table {
      width: 100%; border-collapse: collapse;
      background: var(--surface); border-radius: 10px; overflow: hidden;
      border: 1px solid var(--border);
    }
    .picks-table th {
      text-align: left; padding: 10px 12px; font-size: 11px;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border); background: var(--surface-2);
    }
    .picks-table td {
      padding: 10px 12px; font-size: 13px;
      border-bottom: 1px solid var(--border);
    }
    .picks-table tr:last-child td { border-bottom: none; }
    .picks-table tr:hover td { background: var(--surface-2); }

    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .badge-t1 { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .badge-t2 { background: rgba(168,85,247,0.15); color: var(--purple); }
    .badge-t3 { background: rgba(249,115,22,0.15); color: var(--orange); }
    .badge-hit { background: rgba(63,185,80,0.15); color: var(--green); }
    .badge-miss { background: rgba(248,81,73,0.15); color: var(--red); }
    .badge-pending { background: rgba(139,148,158,0.15); color: var(--text-muted); }

    .bar-cell { position: relative; }
    .score-bar {
      position: absolute; left: 0; top: 0; bottom: 0;
      background: rgba(88,166,255,0.1); border-radius: 0 4px 4px 0;
    }
    .score-val { position: relative; z-index: 1; font-weight: 600; }

    /* Factor breakdown bars */
    .factor-bars { display: flex; gap: 3px; align-items: center; }
    .factor-seg {
      height: 18px; border-radius: 3px; min-width: 2px;
      position: relative; cursor: default;
    }
    .factor-seg:hover::after {
      content: attr(data-label);
      position: absolute; bottom: 100%; left: 50%; transform: translateX(-50%);
      background: var(--surface-2); border: 1px solid var(--border);
      padding: 2px 6px; border-radius: 4px; font-size: 10px;
      white-space: nowrap; z-index: 10;
    }
    .f-power { background: #f97316; }
    .f-matchup { background: #8b5cf6; }
    .f-park { background: #06b6d4; }
    .f-form { background: #22c55e; }
    .f-weather { background: #eab308; }
    .f-lineup { background: #ec4899; }

    .factor-legend {
      display: flex; gap: 14px; margin-bottom: 16px; font-size: 11px; color: var(--text-muted);
    }
    .factor-legend span::before {
      content: ''; display: inline-block; width: 8px; height: 8px;
      border-radius: 2px; margin-right: 4px; vertical-align: middle;
    }
    .factor-legend .l-power::before { background: #f97316; }
    .factor-legend .l-matchup::before { background: #8b5cf6; }
    .factor-legend .l-park::before { background: #06b6d4; }
    .factor-legend .l-form::before { background: #22c55e; }
    .factor-legend .l-weather::before { background: #eab308; }
    .factor-legend .l-lineup::before { background: #ec4899; }

    /* History section */
    .day-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 16px; margin-bottom: 12px;
    }
    .day-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }
    .day-date { font-weight: 600; font-size: 14px; }
    .day-result { font-size: 13px; font-weight: 600; }

    /* Chart */
    .chart-container {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 20px; margin-bottom: 24px;
    }
    .chart-container h3 { font-size: 14px; margin-bottom: 12px; color: var(--text-muted); }

    /* Top hitters */
    .hitter-row {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 0; border-bottom: 1px solid var(--border);
    }
    .hitter-row:last-child { border-bottom: none; }
    .hitter-rank { width: 24px; font-size: 13px; color: var(--text-muted); text-align: center; }
    .hitter-name { flex: 1; font-size: 14px; font-weight: 500; }
    .hitter-team { font-size: 12px; color: var(--text-muted); width: 36px; }
    .hitter-stat { font-size: 13px; font-weight: 600; width: 60px; text-align: right; }

    /* Loading / empty */
    .loading { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty { text-align: center; padding: 40px; color: var(--text-muted); font-size: 14px; }

    /* Responsive */
    @media (max-width: 768px) {
      .stat-row { grid-template-columns: repeat(2, 1fr); }
      .picks-table { font-size: 12px; }
      .picks-table th, .picks-table td { padding: 8px 6px; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>HR</span> Parlay Tracker</h1>
      <div class="date-badge" id="dateBadge">Loading...</div>
    </header>

    <div class="tabs">
      <div class="tab active" data-panel="today">Today's Picks</div>
      <div class="tab" data-panel="recap">HR Recap <span class="live-dot" id="recapLiveDot" title="Live"></span></div>
      <div class="tab" data-panel="history">History</div>
      <div class="tab" data-panel="stats">Performance</div>
    </div>

    <!-- TODAY'S PICKS -->
    <div class="panel active" id="panel-today">
      <div class="stat-row" id="todayStats"></div>
      <div class="factor-legend">
        <span class="l-power">Power</span>
        <span class="l-matchup">Matchup</span>
        <span class="l-park">Park</span>
        <span class="l-form">Form</span>
        <span class="l-weather">Weather</span>
        <span class="l-lineup">Lineup</span>
      </div>
      <div id="todayTable"><div class="loading">Loading picks...</div></div>
    </div>

    <!-- HR RECAP (live) -->
    <div class="panel" id="panel-recap">
      <div class="stat-row" id="recapStats"></div>
      <div class="recap-header">
        <h3>Today's Home Runs <span class="recap-status" id="recapStatus">loading…</span></h3>
        <button class="recap-refresh" id="recapRefresh" type="button">Refresh</button>
      </div>
      <div id="recapList"><div class="loading">Loading live HR feed…</div></div>
    </div>

    <!-- HISTORY -->
    <div class="panel" id="panel-history">
      <div class="chart-container">
        <h3>Hit Rate Over Time</h3>
        <canvas id="hitRateChart" height="200"></canvas>
      </div>
      <div id="historyList"><div class="loading">Loading history...</div></div>
    </div>

    <!-- PERFORMANCE -->
    <div class="panel" id="panel-stats">
      <div class="stat-row" id="perfStats"></div>
      <div class="chart-container">
        <h3>Factor Score Trends (Selected Picks)</h3>
        <canvas id="factorChart" height="220"></canvas>
      </div>
      <div class="chart-container">
        <h3>Top Hitters (3+ picks)</h3>
        <div id="topHitters"><div class="loading">Loading...</div></div>
      </div>
    </div>
  </div>

  <script>
    // ── Tab switching ──
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById('panel-' + tab.dataset.panel).classList.add('active');
      });
    });

    // ── Data fetching ──
    const DATA_BASE = './data/';

    async function fetchJSON(file) {
      try {
        const resp = await fetch(DATA_BASE + file + '?t=' + Date.now());
        if (!resp.ok) return null;
        return await resp.json();
      } catch { return null; }
    }

    // ── Helpers ──
    function tierBadge(tier) {
      const t = tier || 0;
      const cls = t === 1 ? 'badge-t1' : t === 2 ? 'badge-t2' : 'badge-t3';
      const label = t === 1 ? 'T1' : t === 2 ? 'T2' : 'T3';
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function outcomeBadge(hr) {
      if (hr > 0) return '<span class="badge badge-hit">HR</span>';
      if (hr === 0) return '<span class="badge badge-miss">Miss</span>';
      return '<span class="badge badge-pending">Pending</span>';
    }

    function factorBars(p) {
      const factors = [
        { key: 'power_score', cls: 'f-power', label: 'Power' },
        { key: 'matchup_score', cls: 'f-matchup', label: 'Matchup' },
        { key: 'park_score', cls: 'f-park', label: 'Park' },
        { key: 'form_score', cls: 'f-form', label: 'Form' },
        { key: 'weather_score', cls: 'f-weather', label: 'Weather' },
        { key: 'lineup_score', cls: 'f-lineup', label: 'Lineup' },
      ];
      const maxW = 120;
      return '<div class="factor-bars">' +
        factors.map(f => {
          const v = p[f.key] || 0;
          const w = Math.max(2, (v / 100) * maxW);
          return `<div class="factor-seg ${f.cls}" style="width:${w}px" data-label="${f.label}: ${v.toFixed(1)}"></div>`;
        }).join('') + '</div>';
    }

    function orderLabel(bo) {
      if (typeof bo === 'number') return '#' + bo;
      if (bo === 'bench') return 'BN';
      if (bo === 'roster_only') return 'RST';
      return '-';
    }

    // ── Render: Today's Picks ──
    async function renderToday() {
      const data = await fetchJSON('picks_latest');
      if (!data) {
        document.getElementById('todayTable').innerHTML = '<div class="empty">No picks data available yet. Run generate_picks.py + export_site_data.py first.</div>';
        return;
      }

      document.getElementById('dateBadge').textContent = data.date;

      const picks = data.picks || [];
      const board = data.full_board || [];

      // Stat cards
      const avgComp = picks.length
        ? (picks.reduce((s, p) => s + (p.composite || 0), 0) / picks.length).toFixed(1)
        : '0';
      const tiers = {};
      picks.forEach(p => { tiers[p.tier_label || 'T?'] = (tiers[p.tier_label || 'T?'] || 0) + 1; });
      const tierStr = Object.entries(tiers).map(([k, v]) => `${v}x ${k}`).join(', ');

      document.getElementById('todayStats').innerHTML = `
        <div class="stat-card"><div class="label">Picks</div><div class="value accent">${picks.length}</div></div>
        <div class="stat-card"><div class="label">Avg Composite</div><div class="value">${avgComp}</div></div>
        <div class="stat-card"><div class="label">Tier Mix</div><div class="value" style="font-size:16px">${tierStr}</div></div>
        <div class="stat-card"><div class="label">Board Size</div><div class="value">${board.length}</div></div>
      `;

      // Table
      let html = `<table class="picks-table">
        <thead><tr>
          <th>#</th><th>Player</th><th>Team</th><th>Tier</th>
          <th class="hide-mobile">vs Pitcher</th><th>Score</th>
          <th class="hide-mobile">Order</th>
          <th class="hide-mobile">Factors</th>
        </tr></thead><tbody>`;

      picks.forEach((p, i) => {
        const barW = Math.min(100, (p.composite || 0) / 80 * 100);
        html += `<tr>
          <td>${i + 1}</td>
          <td style="font-weight:600">${p.batter_name || p.name}</td>
          <td>${p.team}</td>
          <td>${tierBadge(p.tier)}</td>
          <td class="hide-mobile">${p.opp_pitcher || '-'}</td>
          <td class="bar-cell">
            <div class="score-bar" style="width:${barW}%"></div>
            <span class="score-val">${(p.composite || 0).toFixed(1)}</span>
          </td>
          <td class="hide-mobile">${orderLabel(p.batting_order)}</td>
          <td class="hide-mobile">${factorBars(p)}</td>
        </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('todayTable').innerHTML = html;
    }

    // ── Render: History ──
    async function renderHistory() {
      const data = await fetchJSON('picks_history');
      if (!data || !data.history || data.history.length === 0) {
        document.getElementById('historyList').innerHTML = '<div class="empty">No history data yet.</div>';
        return;
      }

      const history = data.history;

      // Chart
      const chartDays = history.slice().reverse().slice(-30);
      const ctx = document.getElementById('hitRateChart').getContext('2d');
      new Chart(ctx, {
        type: 'bar',
        data: {
          labels: chartDays.map(d => d.date.slice(5)),
          datasets: [
            {
              label: 'Hits',
              data: chartDays.map(d => d.hits),
              backgroundColor: 'rgba(63,185,80,0.6)',
              borderRadius: 3,
            },
            {
              label: 'Misses',
              data: chartDays.map(d => d.total - d.hits),
              backgroundColor: 'rgba(248,81,73,0.25)',
              borderRadius: 3,
            }
          ]
        },
        options: {
          responsive: true,
          scales: {
            x: { stacked: true, ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#30363d' } },
            y: { stacked: true, beginAtZero: true, ticks: { color: '#8b949e', stepSize: 1 }, grid: { color: '#30363d' } }
          },
          plugins: { legend: { labels: { color: '#e6edf3', font: { size: 11 } } } }
        }
      });

      // Day cards
      let html = '';
      history.forEach(day => {
        const resultColor = day.hits > 0 ? 'var(--green)' : 'var(--red)';
        const resultText = day.outcomes_available
          ? `${day.hits}/${day.total} hit (${day.hit_rate}%)`
          : 'Pending';

        html += `<div class="day-card">
          <div class="day-header">
            <span class="day-date">${day.date}</span>
            <span class="day-result" style="color:${day.outcomes_available ? resultColor : 'var(--text-muted)'}">${resultText}</span>
          </div>
          <table class="picks-table" style="border:none">
            <thead><tr>
              <th>Player</th><th>Team</th><th>Score</th><th>Result</th>
            </tr></thead><tbody>`;

        day.picks.forEach(p => {
          html += `<tr>
            <td style="font-weight:500">${p.name}</td>
            <td>${p.team}</td>
            <td>${(p.composite || 0).toFixed(1)}</td>
            <td>${outcomeBadge(p.hr_count)}</td>
          </tr>`;
        });

        html += '</tbody></table></div>';
      });

      document.getElementById('historyList').innerHTML = html;
    }

    // ── Render: Performance ──
    async function renderPerformance() {
      const perf = await fetchJSON('performance');
      const trends = await fetchJSON('factor_trends');

      if (!perf) {
        document.getElementById('perfStats').innerHTML = '<div class="empty">No performance data yet. Run outcomes ETL first.</div>';
        return;
      }

      const o = perf.overall;
      document.getElementById('perfStats').innerHTML = `
        <div class="stat-card"><div class="label">Total Picks</div><div class="value accent">${o.total_picks}</div></div>
        <div class="stat-card"><div class="label">HR Hits</div><div class="value green">${o.hits}</div></div>
        <div class="stat-card"><div class="label">Hit Rate</div><div class="value" style="color:${o.hit_rate > 12 ? 'var(--green)' : 'var(--orange)'}">${o.hit_rate}%</div></div>
        <div class="stat-card"><div class="label">Hit Streak</div><div class="value orange">${perf.current_hit_streak_days}d</div></div>
        <div class="stat-card"><div class="label">Avg Comp (Hits)</div><div class="value">${perf.composite_analysis.avg_hit_composite || '-'}</div></div>
        <div class="stat-card"><div class="label">Avg Comp (Miss)</div><div class="value" style="color:var(--text-muted)">${perf.composite_analysis.avg_miss_composite || '-'}</div></div>
      `;

      // Factor trend chart
      if (trends && trends.trends && trends.trends.length > 0) {
        const t = trends.trends;
        const ctx2 = document.getElementById('factorChart').getContext('2d');
        new Chart(ctx2, {
          type: 'line',
          data: {
            labels: t.map(d => d.date.slice(5)),
            datasets: [
              { label: 'Power', data: t.map(d => d.avg_power), borderColor: '#f97316', borderWidth: 2, tension: 0.3, pointRadius: 2 },
              { label: 'Matchup', data: t.map(d => d.avg_matchup), borderColor: '#8b5cf6', borderWidth: 2, tension: 0.3, pointRadius: 2 },
              { label: 'Form', data: t.map(d => d.avg_form), borderColor: '#22c55e', borderWidth: 2, tension: 0.3, pointRadius: 2 },
              { label: 'Lineup', data: t.map(d => d.avg_lineup), borderColor: '#ec4899', borderWidth: 2, tension: 0.3, pointRadius: 2 },
              { label: 'Park', data: t.map(d => d.avg_park), borderColor: '#06b6d4', borderWidth: 1.5, tension: 0.3, pointRadius: 1, borderDash: [4,2] },
              { label: 'Weather', data: t.map(d => d.avg_weather), borderColor: '#eab308', borderWidth: 1.5, tension: 0.3, pointRadius: 1, borderDash: [4,2] },
            ]
          },
          options: {
            responsive: true,
            interaction: { mode: 'index', intersect: false },
            scales: {
              x: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#30363d' } },
              y: { min: 0, max: 100, ticks: { color: '#8b949e' }, grid: { color: '#30363d' } }
            },
            plugins: { legend: { labels: { color: '#e6edf3', font: { size: 11 } } } }
          }
        });
      }

      // Top hitters
      if (perf.top_hitters && perf.top_hitters.length > 0) {
        let html = '';
        perf.top_hitters.forEach((h, i) => {
          const rate = h.times_picked > 0 ? Math.round(h.times_hit / h.times_picked * 100) : 0;
          html += `<div class="hitter-row">
            <div class="hitter-rank">${i + 1}</div>
            <div class="hitter-name">${h.name}</div>
            <div class="hitter-team">${h.team}</div>
            <div class="hitter-stat">${h.times_hit}/${h.times_picked}</div>
            <div class="hitter-stat" style="color:${rate > 15 ? 'var(--green)' : 'var(--text-muted)'}">${rate}%</div>
            <div class="hitter-stat" style="color:var(--text-muted)">${h.avg_composite}</div>
          </div>`;
        });
        document.getElementById('topHitters').innerHTML = html;
      }
    }

    // ── HR Recap (live feed) ──
    // Talks to the dingersonly-live-hr Cloudflare Worker bound at /api/*.
    // The Worker pulls the MLB Stats API every minute and caches the result
    // in KV; we poll every 30s and only repaint when something changed.
    // The live-HR Worker lives on its own subdomain because dingersonly.cc
    // itself is served by a Worker-with-Static-Assets, and CF won't let
    // another Worker take routes on a hostname owned by an assets worker.
    // The Worker sets permissive CORS so the cross-origin fetch is fine.
    const LIVE_HR_ENDPOINT = 'https://api.dingersonly.cc/api/live-hrs';
    const RECAP_POLL_MS = 30 * 1000;
    // Dot stales when the BROWSER stops being able to reach the feed.
    // (We don't tie it to data.updatedAt, because on a slow inning the
    // Worker correctly skips KV writes — that's expected, not staleness.)
    const RECAP_STALE_MS = 2 * 60 * 1000;

    const recapState = {
      contentUpdatedAt: null, // when feed content last changed
      lastFetchOkAt: null,    // when the browser last got 200 from /api/live-hrs
      seenIds: new Set(),
      timer: null,
    };

    function fmtTime(iso) {
      if (!iso) return '';
      try {
        const d = new Date(iso);
        return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
      } catch { return ''; }
    }

    function ordInning(n, half) {
      if (!n) return '';
      const arrow = half === 'top' ? '▲' : half === 'bottom' ? '▼' : '';
      return `${arrow} ${n}`;
    }

    function renderRecapEmpty(payload) {
      const games = payload?.gamesTotal || 0;
      const live = payload?.gamesLiveOrFinal || 0;
      let msg;
      if (games === 0) {
        msg = 'No MLB games scheduled today.';
      } else if (live === 0) {
        msg = `${games} game${games > 1 ? 's' : ''} on the slate — none have started yet.`;
      } else {
        msg = `${live} game${live > 1 ? 's' : ''} live, no home runs yet today.`;
      }
      return `<div class="hr-empty">${msg}</div>`;
    }

    function renderHRCard(hr, isNew) {
      const team = hr.battingTeamAbbr || hr.battingTeam || '';
      const meta = [];
      if (hr.pitcherName) meta.push(`<span class="pill">vs ${hr.pitcherName}</span>`);
      if (hr.launchSpeed) meta.push(`<span class="pill">${Math.round(hr.launchSpeed)} mph</span>`);
      if (hr.totalDistance) meta.push(`<span class="pill">${hr.totalDistance} ft</span>`);
      if (hr.launchAngle) meta.push(`<span class="pill">${Math.round(hr.launchAngle)}°</span>`);
      const score = (hr.awayScore != null && hr.homeScore != null)
        ? `<div class="score">${hr.awayScore} - ${hr.homeScore}</div>` : '';
      return `<div class="hr-card${isNew ? ' new' : ''}" data-id="${hr.id}">
        <div class="hr-inning">
          <span class="num">${hr.inning || '-'}</span>
          ${hr.halfInning ? hr.halfInning : ''}
        </div>
        <div class="hr-body">
          <div class="player">${hr.batterName} <span style="color:var(--text-muted);font-weight:500">(${team})</span></div>
          <div class="meta">${meta.join('')}</div>
          ${hr.description ? `<div class="desc">${hr.description}</div>` : ''}
        </div>
        <div class="hr-side">
          ${score}
          <div>${fmtTime(hr.time)}</div>
          <div style="opacity:0.7">${hr.venue || ''}</div>
        </div>
      </div>`;
    }

    function updateLiveDot() {
      const dot = document.getElementById('recapLiveDot');
      if (!dot) return;
      const fresh = recapState.lastFetchOkAt &&
        (Date.now() - recapState.lastFetchOkAt) < RECAP_STALE_MS;
      dot.classList.toggle('stale', !fresh);
      const parts = [];
      if (recapState.contentUpdatedAt) {
        parts.push(`Last HR / state change: ${fmtTime(recapState.contentUpdatedAt)}`);
      }
      if (recapState.lastFetchOkAt) {
        parts.push(`Last poll: ${fmtTime(new Date(recapState.lastFetchOkAt).toISOString())}`);
      }
      dot.title = parts.join('\n') || 'Live';
    }

    async function fetchRecap() {
      try {
        const resp = await fetch(LIVE_HR_ENDPOINT + '?t=' + Date.now());
        if (!resp.ok) return null;
        const data = await resp.json();
        recapState.lastFetchOkAt = Date.now();
        return data;
      } catch { return null; }
    }

    async function renderRecap() {
      const data = await fetchRecap();
      const statusEl = document.getElementById('recapStatus');
      const listEl = document.getElementById('recapList');

      if (!data) {
        statusEl.textContent = 'feed unavailable';
        listEl.innerHTML = `<div class="hr-empty">Live feed is unavailable right now. We'll try again in 30s.</div>`;
        updateLiveDot();
        return;
      }

      recapState.contentUpdatedAt = data.updatedAt;

      // Stat cards
      const hrs = data.hrs || [];
      const games = data.games || [];
      const liveGames = games.filter(g => g.abstract === 'Live').length;
      const lastHRTime = hrs.length ? hrs[0].time : null;
      document.getElementById('recapStats').innerHTML = `
        <div class="stat-card"><div class="label">HRs Today</div><div class="value green">${hrs.length}</div></div>
        <div class="stat-card"><div class="label">Live Games</div><div class="value accent">${liveGames}</div></div>
        <div class="stat-card"><div class="label">Total Games</div><div class="value">${games.length}</div></div>
        <div class="stat-card"><div class="label">Last HR</div><div class="value" style="font-size:16px">${fmtTime(lastHRTime) || '—'}</div></div>
      `;

      statusEl.textContent = data.updatedAt ? `data as of ${fmtTime(data.updatedAt)}` : '';

      if (hrs.length === 0) {
        listEl.innerHTML = renderRecapEmpty(data);
        // Reset seen so the first HR of the day gets the flash animation.
        recapState.seenIds = new Set();
      } else {
        const html = hrs.map(hr => {
          const isNew = !recapState.seenIds.has(hr.id);
          return renderHRCard(hr, isNew);
        }).join('');
        listEl.innerHTML = html;
        // After repaint, mark everything seen.
        hrs.forEach(hr => recapState.seenIds.add(hr.id));
      }

      updateLiveDot();
    }

    function startRecapPolling() {
      if (recapState.timer) return;
      renderRecap();
      recapState.timer = setInterval(renderRecap, RECAP_POLL_MS);
    }

    document.getElementById('recapRefresh')?.addEventListener('click', async (e) => {
      const btn = e.currentTarget;
      btn.disabled = true;
      await renderRecap();
      btn.disabled = false;
    });

    // Pause polling when the tab is hidden, resume on focus — saves requests.
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) {
        if (recapState.timer) { clearInterval(recapState.timer); recapState.timer = null; }
      } else {
        startRecapPolling();
      }
    });

    // ── Init ──
    renderToday();
    renderHistory();
    renderPerformance();
    startRecapPolling();
  </script>
</body>
</html>
