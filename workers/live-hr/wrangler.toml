name = "dingersonly-live-hr"
main = "src/index.js"
compatibility_date = "2025-04-01"

# Account ID is hard-coded so `wrangler deploy` doesn't need to call the
# /memberships API to discover it. The CI-deploy GitHub Action uses an API
# token that's scoped to Workers Scripts:Edit but lacks User->User Details:Read,
# so the membership lookup fails (auth code 10000) and aborts the deploy.
#
# That silent-failure mode is why PRs #31, #37, and #46 all merged without
# their worker changes ever reaching production — the action would deploy,
# log the auth error, exit 1, and nobody noticed because the smoke-check
# never ran. Pinning account_id here bypasses the membership call and lets
# the existing token's actual permissions (Workers Scripts:Edit) do the job.
#
# Account ID is not secret — it's a tenant identifier visible in any
# wrangler whoami output. Checking it in is the CF-idiomatic fix.
account_id = "a5aacdb089b643b16526e40d9974efd6"

# Run every minute. (Cloudflare's smallest cron granularity.)
# We early-exit inside the handler when no games are scheduled, so
# off-season / off-day invocations are essentially free.
[triggers]
crons = ["* * * * *"]

# KV namespace where we cache the assembled HR feed.
# Replace `id` with the value printed by:
#   wrangler kv namespace create LIVE_HR_KV
# and `preview_id` with:
#   wrangler kv namespace create LIVE_HR_KV --preview
[[kv_namespaces]]
binding = "LIVE_HR_KV"
id = "1db524405e214f768012670165b73399"
preview_id = "ef2a9d414d3b4d74af21bb18fe8a0cda"

# Bind the Worker to api.dingersonly.cc.
# We can't use a path-based route on dingersonly.cc itself because the
# dingersonlybot Worker is serving the apex with Static Assets, and CF
# disallows another Worker route on a hostname owned by an assets worker.
# A custom domain on the subdomain sidesteps that cleanly.
#
# Easiest setup: do this in the dashboard
#   Workers > dingersonly-live-hr > Settings > Domains & Routes > Add Custom Domain
#   Domain: api.dingersonly.cc
# CF auto-provisions the DNS record + cert.
#
# Or via wrangler — uncomment after `wrangler deploy` succeeds at least once:
# [[routes]]
# pattern = "api.dingersonly.cc"
# custom_domain = true

[vars]
# America/New_York is what MLB schedules against. We use this to decide
# what "today" means when the cron fires near midnight UTC.
MLB_TIMEZONE = "America/New_York"
