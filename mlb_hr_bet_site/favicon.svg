<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Baseball — cream ball with red horseshoe seams. -->
  <!-- Ball -->
  <circle cx="50" cy="50" r="46" fill="#fbfbfa" stroke="#1a1f24" stroke-width="2"/>
  <!-- Two curved seams (the classic baseball horseshoe pattern) -->
  <path d="M 18 38 Q 50 22, 82 38" fill="none" stroke="#b9472d" stroke-width="3" stroke-linecap="round"/>
  <path d="M 18 62 Q 50 78, 82 62" fill="none" stroke="#b9472d" stroke-width="3" stroke-linecap="round"/>
  <!-- Stitch ticks along the upper seam -->
  <g stroke="#b9472d" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="22" y1="36" x2="20" y2="32"/>
    <line x1="30" y1="30" x2="29" y2="25"/>
    <line x1="40" y1="26" x2="40" y2="21"/>
    <line x1="50" y1="25" x2="50" y2="20"/>
    <line x1="60" y1="26" x2="60" y2="21"/>
    <line x1="70" y1="30" x2="71" y2="25"/>
    <line x1="78" y1="36" x2="80" y2="32"/>
  </g>
  <!-- Stitch ticks along the lower seam -->
  <g stroke="#b9472d" stroke-width="1.6" stroke-linecap="round" fill="none">
    <line x1="22" y1="64" x2="20" y2="68"/>
    <line x1="30" y1="70" x2="29" y2="75"/>
    <line x1="40" y1="74" x2="40" y2="79"/>
    <line x1="50" y1="75" x2="50" y2="80"/>
    <line x1="60" y1="74" x2="60" y2="79"/>
    <line x1="70" y1="70" x2="71" y2="75"/>
    <line x1="78" y1="64" x2="80" y2="68"/>
  </g>
</svg>
